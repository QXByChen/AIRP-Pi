function zoomPortrait(url) {
  var modal = document.getElementById('beautify-modal');
  var img = document.getElementById('beautify-modal-img');
  if (!modal || !img || !url) return;
  img.src = url;
  modal.style.display = 'flex';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══ Card Management ═══
var _currentCardId = '';
var _allTags = [];
var _currentFav = false;

function loadCards() {
  var search = (document.getElementById('card-search') || {}).value || '';
  var sort = (document.getElementById('card-sort') || {}).value || 'name';
  var tag = (document.getElementById('card-tag-active') || {}).value || '';
  var url = '/api/cards?sort=' + encodeURIComponent(sort) + '&search=' + encodeURIComponent(search) + '&tag=' + encodeURIComponent(tag);
  fetch(url).then(r => r.json()).then(d => {
    if (!d.ok) return;
    // Update topbar select
    var sel = document.getElementById('card-select');
    var prev = sel.value;
    sel.innerHTML = '';
    (d.cards || []).forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = (c.fav ? '★ ' : '') + (c.name || c.id) + (c.messages ? ' (' + c.messages + '轮)' : '');
      if (c.active) opt.selected = true;
      sel.appendChild(opt);
    });
    _currentCardId = d.current || sel.value;
    // Update card grid
    renderCardGrid(d.cards || []);
    // Update tag filter chips
    if (d.tags) {
      _allTags = d.tags;
      renderTagFilter(d.tags);
    }
    loadCardFields();
  }).catch(function() {});
}

function renderCardGrid(cards) {
  var grid = document.getElementById('card-grid');
  if (!grid) return;
  grid.innerHTML = '';
  cards.forEach(function(c) {
    var cell = document.createElement('div');
    cell.style.cssText = 'cursor:pointer;border-radius:6px;border:2px solid ' + (c.active ? 'var(--accent)' : 'transparent') + ';overflow:hidden;position:relative;aspect-ratio:2/3;background:var(--input-bg);display:flex;align-items:center;justify-content:center;';
    cell.title = (c.name || c.id) + (c.messages ? ' (' + c.messages + '轮)' : '');
    cell.onclick = (function(id) { return function() { switchCard(id); }; })(c.id);
    if (c.avatar) {
      var img = document.createElement('img');
      img.src = '/api/image?path=' + encodeURIComponent(c.avatar);
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      img.loading = 'lazy';
      cell.appendChild(img);
    } else {
      var txt = document.createElement('span');
      txt.textContent = (c.name || c.id).slice(0, 2);
      txt.style.cssText = 'font-size:0.9em;color:var(--muted);';
      cell.appendChild(txt);
    }
    if (c.fav) {
      var star = document.createElement('span');
      star.textContent = '★';
      star.style.cssText = 'position:absolute;top:1px;right:2px;font-size:0.7em;color:#f1c40f;text-shadow:0 0 2px #000;';
      cell.appendChild(star);
    }
    grid.appendChild(cell);
  });
}

function renderTagFilter(tags) {
  var container = document.getElementById('card-tag-filter');
  if (!container) return;
  var activeTag = (document.getElementById('card-tag-active') || {}).value || '';
  container.innerHTML = '<input type="hidden" id="card-tag-active" value="' + activeTag + '">';
  tags.forEach(function(t) {
    var chip = document.createElement('span');
    chip.textContent = t;
    chip.style.cssText = 'padding:1px 5px;border-radius:3px;cursor:pointer;border:1px solid var(--border);' + (t === activeTag ? 'background:var(--accent);color:#fff;' : 'background:var(--input-bg);color:var(--muted);');
    chip.onclick = function() {
      var hidden = document.getElementById('card-tag-active');
      hidden.value = (hidden.value === t) ? '' : t;
      loadCards();
    };
    container.appendChild(chip);
  });
}

function switchCard(cardId) {
  if (!cardId || cardId === _currentCardId) return;
  toastr.info('切换中...');
  fetch('/api/play', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({card: cardId})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        _currentCardId = d.current || cardId;
        toastr.success('已切换: ' + (d.card && d.card.fields && d.card.fields.name || cardId));
        reloadData();
        loadOpenings();
        loadCards();
      } else {
        toastr.error('切换失败: ' + (d.error || ''));
      }
    }).catch(e => toastr.error('切换请求失败'));
}

function loadCardFields() {
  fetch('/api/card').then(r => r.json()).then(d => {
    if (!d.ok || !d.card) return;
    var f = d.card.fields || {};
    document.getElementById('ce-name').value = f.name || '';
    document.getElementById('ce-tags').value = Array.isArray(f.tags) ? f.tags.join(', ') : (f.tags || '');
    document.getElementById('ce-description').value = f.description || '';
    document.getElementById('ce-personality').value = f.personality || '';
    document.getElementById('ce-scenario').value = f.scenario || '';
    document.getElementById('ce-first-mes').value = f.first_mes || '';
    document.getElementById('ce-alt-greetings').value = Array.isArray(f.alternate_greetings) ? f.alternate_greetings.join('\n---\n') : '';
    document.getElementById('ce-creator-notes').value = f.creator_notes || '';
    // Update fav button
    _currentFav = d.card.fav || false;
    document.getElementById('fav-btn').textContent = _currentFav ? '★' : '☆';
    document.getElementById('fav-btn').style.color = _currentFav ? '#f1c40f' : 'var(--muted)';
  }).catch(function() {});
}

function saveCardFields() {
  var fields = {
    name: document.getElementById('ce-name').value,
    tags: document.getElementById('ce-tags').value,
    description: document.getElementById('ce-description').value,
    personality: document.getElementById('ce-personality').value,
    scenario: document.getElementById('ce-scenario').value,
    first_mes: document.getElementById('ce-first-mes').value,
    alternate_greetings: document.getElementById('ce-alt-greetings').value,
    creator_notes: document.getElementById('ce-creator-notes').value
  };
  fetch('/api/card/update', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: _currentCardId, fields: fields})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        toastr.success('卡片已保存');
        loadCards();
      } else {
        toastr.error('保存失败: ' + (d.error || ''));
      }
    }).catch(e => toastr.error('保存请求失败'));
}

function deleteCurrentCard() {
  if (!_currentCardId) return;
  if (!confirm('确定删除角色卡「' + _currentCardId + '」？\n（将移至回收站，可手动恢复）')) return;
  fetch('/api/card/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({card: _currentCardId})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        toastr.success('已删除');
        _currentCardId = d.current || '';
        loadCards();
        loadCardFields();
        reloadData();
      } else {
        toastr.error('删除失败: ' + (d.error || ''));
      }
    }).catch(e => toastr.error('删除请求失败'));
}

function duplicateCard() {
  if (!_currentCardId) return;
  fetch('/api/card/duplicate', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({card: _currentCardId})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        toastr.success('已复制: ' + d.new_card);
        loadCards();
      } else {
        toastr.error('复制失败: ' + (d.error || ''));
      }
    }).catch(e => toastr.error('复制请求失败'));
}

function exportCard() {
  if (!_currentCardId) return;
  fetch('/api/card/export', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({card: _currentCardId})})
    .then(r => {
      if (!r.ok) throw new Error('export failed');
      return r.blob();
    })
    .then(blob => {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = _currentCardId + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
      toastr.success('已导出');
    }).catch(e => toastr.error('导出失败'));
}

function toggleFav() {
  if (!_currentCardId) return;
  fetch('/api/card/fav', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({card: _currentCardId})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        _currentFav = d.fav;
        document.getElementById('fav-btn').textContent = d.fav ? '★' : '☆';
        document.getElementById('fav-btn').style.color = d.fav ? '#f1c40f' : 'var(--muted)';
        loadCards();
      }
    }).catch(function() {});
}

function loadTrash() {
  fetch('/api/trash').then(r => r.json()).then(d => {
    if (!d.ok) return;
    var list = document.getElementById('trash-list');
    if (!d.items || !d.items.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:4px;">回收站为空</div>';
      return;
    }
    list.innerHTML = '';
    d.items.forEach(function(item) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid var(--border);';
      row.innerHTML = '<span>' + (item.display_name || item.original_name) + '</span><button onclick="restoreCard(\'' + item.id.replace(/'/g, "\\'") + '\')" style="padding:1px 6px;border-radius:3px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:0.7em;cursor:pointer;">恢复</button>';
      list.appendChild(row);
    });
  }).catch(function() {});
}

function restoreCard(trashId) {
  fetch('/api/trash/restore', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: trashId})})
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        toastr.success('已恢复: ' + d.restored);
        loadCards();
        loadTrash();
      } else {
        toastr.error('恢复失败: ' + (d.error || ''));
      }
    }).catch(e => toastr.error('恢复请求失败'));
}

// ═══ Dark Mode Toggle ═══
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
  document.getElementById('theme-toggle').addEventListener('click', function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      this.textContent = '🌙';
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      this.textContent = '☀️';
      localStorage.setItem('theme', 'dark');
    }
    // Re-check word count colors for current theme
    if (typeof updateWordCount === 'function') updateWordCount();
    if (typeof updateTokenCount === 'function') updateTokenCount();
  });
})();

// ═══ Drag & Drop Card Import ═══
(function() {
  var overlay = document.createElement('div');
  overlay.id = 'drop-overlay';
  overlay.innerHTML = '<div class="drop-inner"><p>拖入角色卡 PNG 文件导入</p></div>';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;';
  var inner = overlay.querySelector('.drop-inner');
  inner.style.cssText = 'border:3px dashed #e94560;border-radius:16px;padding:60px;text-align:center;color:#fff;font-size:20px;';
  document.body.appendChild(overlay);

  var dragCount = 0;
  document.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCount++;
    overlay.style.display = 'flex';
  });
  document.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCount--;
    if (dragCount <= 0) { overlay.style.display = 'none'; dragCount = 0; }
  });
  document.addEventListener('dragover', function(e) { e.preventDefault(); });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    overlay.style.display = 'none';
    dragCount = 0;
    var files = e.dataTransfer.files;
    if (!files.length) return;
    var file = files[0];
    if (!file.name.match(/\.(png|json)$/i)) {
      toastr.error('仅支持 PNG 或 JSON 角色卡文件');
      return;
    }
    var fd = new FormData();
    fd.append('file', file);
    toastr.info('正在导入: ' + file.name);
    fetch('/api/import-card', { method: 'POST', body: fd })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          toastr.success('角色卡已导入: ' + d.card_id);
          _currentCardId = d.card_id;
          loadCards();
          loadCardFields();
          reloadData();
        } else {
          toastr.error('导入失败: ' + (d.error || '未知错误'));
        }
      })
      .catch(function(err) { toastr.error('导入请求失败: ' + err.message); });
  });
})();

  // Poll for image generation tasks and update sidebar + inline images
  function pollImggenTasks() {
    fetch('/api/image-gen/tasks?limit=5').then(function(r){return r.json()}).then(function(d) {
      if (!d.ok) return;
      var tasks = d.tasks || [];
      var latestEl = document.getElementById('sb-imggen-latest');
      var statusEl = document.getElementById('sb-imggen-status');
      var generating = tasks.filter(function(t){return t.status==='generating'||t.status==='pending'});
      var done = tasks.filter(function(t){return t.status==='done'&&t.image_path});

      if (generating.length > 0) {
        statusEl.style.display = '';
        statusEl.textContent = '⏳ 生成中... ('+generating.length+'个任务)';
        startFabLoading();
      } else {
        statusEl.style.display = 'none';
        stopFabLoading();
      }

      if (done.length > 0) {
        var latest = done[0];
        latestEl.innerHTML = '<img src="/api/image?path='+encodeURIComponent(latest.image_path)+'" style="width:100%;max-height:200px;object-fit:contain;border-radius:4px;cursor:pointer;border:1px solid var(--border);" onclick="showImggenLightbox(\''+esc(latest.image_path)+'\')">'
          + '<div style="font-size:0.65em;color:var(--muted);margin-top:2px;">'+esc(latest.prompt.substring(0,40))+'</div>';
      }

      // Replace inline placeholders
      document.querySelectorAll('.img-gen-placeholder').forEach(function(ph) {
        var taskId = ph.getAttribute('data-task');
        var task = tasks.find(function(t){return t.task_id===taskId});
        if (task && task.status === 'done' && task.image_path) {
          var img = document.createElement('img');
          img.src = '/api/image?path=' + encodeURIComponent(task.image_path);
          img.className = 'gen-thumb';
          img.style.cssText = 'max-width:300px;max-height:200px;border-radius:6px;cursor:pointer;margin:8px 0;border:1px solid var(--border);';
          img.onclick = function() { showImggenLightbox(task.image_path); };
          ph.replaceWith(img);
        } else if (task && task.status === 'error') {
          ph.textContent = '❌ ' + (task.error||'生成失败');
          ph.style.color = '#e74c3c';
        }
      });
    }).catch(function(){});
  }

  var _fabEl = document.getElementById('imggen-fab');

  var _fabLongPressTimer = null;
  var _fabIsLoading = false;

  function initFab() {
    if (!_imggenSettings) return;

    if (fab.enabled === false) { _fabEl.style.display = 'none'; return; }

  // Drag handlers
  function fabPointerDown(e) {
    if (e.button && e.button !== 0) return;
    _fabDragging = true; _fabMoved = false;
    _fabEl.classList.add('fab-dragging');
    var touch = e.touches ? e.touches[0] : e;
    _fabStartX = touch.clientX; _fabStartY = touch.clientY;
    var rect = _fabEl.getBoundingClientRect();
    _fabOffX = touch.clientX - rect.left; _fabOffY = touch.clientY - rect.top;
    _fabLongPressTimer = setTimeout(function() {
      if (!_fabMoved) { openFabPrompt(); _fabDragging = false; }
    }, 500);
    e.preventDefault();
  }
  function fabPointerMove(e) {
    if (!_fabDragging) return;
    var touch = e.touches ? e.touches[0] : e;
    var dx = touch.clientX - _fabStartX, dy = touch.clientY - _fabStartY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      _fabMoved = true;
      if (_fabLongPressTimer) { clearTimeout(_fabLongPressTimer); _fabLongPressTimer = null; }
    }
    var x = touch.clientX - _fabOffX, y = touch.clientY - _fabOffY;
    var maxX = window.innerWidth - _fabEl.offsetWidth;
    var maxY = window.innerHeight - _fabEl.offsetHeight;
    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));
    _fabEl.style.left = x + 'px'; _fabEl.style.top = y + 'px';
    e.preventDefault();
  }
  function fabPointerUp(e) {
    if (!_fabDragging) return;
    _fabDragging = false;
    _fabEl.classList.remove('fab-dragging');
    if (_fabLongPressTimer) { clearTimeout(_fabLongPressTimer); _fabLongPressTimer = null; }
    if (_fabMoved) { saveFabPosition(); }
    else if (!_fabMoved) { openImggenSettings(); }
  }

  _fabEl.addEventListener('mousedown', fabPointerDown);
  document.addEventListener('mousemove', fabPointerMove);
  document.addEventListener('mouseup', fabPointerUp);
  _fabEl.addEventListener('touchstart', fabPointerDown, {passive:false});
  document.addEventListener('touchmove', fabPointerMove, {passive:false});
  document.addEventListener('touchend', fabPointerUp);

  // Long-press quick prompt
  function openFabPrompt() {
    var popup = document.getElementById('imggen-fab-prompt-popup');

    popup.style.top = 'auto';
    document.getElementById('fab-prompt-input').focus();
  }

  window.resetFabPosition = function() {

  window.fabQuickGenerate = function() {
    var input = document.getElementById('fab-prompt-input');

    fetch('/api/image-gen', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tags:tags}) })

  // Loading state
  window.startFabLoading = function() { _fabIsLoading = true; _fabEl.classList.add('fab-loading'); };
  window.stopFabLoading = function() { _fabIsLoading = false; _fabEl.classList.remove('fab-loading'); };

  // Init FAB after settings load
  var _origLoadImggenSettings = loadImggenSettings;
  loadImggenSettings = function() {
    fetch('/api/imagegen/settings').then(function(r){return r.json()}).then(function(d) {
      if (d.ok) { _imggenSettings = d.settings; renderImggenTab('main'); initFab(); }
    });
  };
  // Load settings on page load to init FAB
  fetch('/api/imagegen/settings').then(function(r){return r.json()}).then(function(d) {
    if (d.ok) { _imggenSettings = d.settings; initFab(); }
  }).catch(function(){});
})();

// ═══ Bug Report & Error Capture ═══
window._errorLog = [];

function _logFrontendError(msg, detail) {
  window._errorLog.push({ time: new Date().toISOString(), msg: msg, detail: detail || '' });
  var badge = document.getElementById('error-badge');
  if (badge) { badge.textContent = window._errorLog.length; badge.style.display = ''; }
}

window.addEventListener('error', function(e) {
  _logFrontendError('JS: ' + e.message, (e.filename || '') + ':' + (e.lineno || ''));
});
window.addEventListener('unhandledrejection', function(e) {
  _logFrontendError('Promise: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
});

function generateBugReport() {
  var BRIDGE = 'http://localhost:' + (window._BRIDGE_PORT || 8765);
  fetch(BRIDGE + '/api/bug_report')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      data.frontend_errors = window._errorLog;
      var text = _formatBugReport(data);
      _downloadReport(text);
      if (typeof toastr !== 'undefined') toastr.success('诊断报告已下载，请附加到 GitHub Issue');
    })
    .catch(function(e) {
      if (typeof showError === 'function') showError('无法生成诊断报告: ' + e.message);
    });
}

function _formatBugReport(data) {
  var lines = [];
  lines.push('='.repeat(50));
  lines.push('AIRP 诊断报告');
  lines.push('生成时间: ' + (data.generated_at || new Date().toISOString()));
  lines.push('='.repeat(50));
  lines.push('\n## 系统信息');
  if (data.system) {
    lines.push('  OS: ' + data.system.os);
    lines.push('  Python: ' + data.system.python);
    lines.push('  Node: ' + data.system.node);
    lines.push('  浏览器: ' + navigator.userAgent);
  }
  lines.push('\n## 服务状态');
  if (data.services) {
    lines.push('  Bridge Server (8765): ' + (data.services.server_8765 ? '运行中' : '未响应'));
    lines.push('  MVU Server (8766): ' + (data.services.mvu_server_8766 ? '运行中' : '未响应'));
  }
  lines.push('\n## 前端错误 (' + (data.frontend_errors || []).length + ')');
  (data.frontend_errors || []).forEach(function(e) {
    lines.push('  [' + e.time + '] ' + e.msg + (e.detail ? ' (' + e.detail + ')' : ''));
  });
  lines.push('\n## 错误摘要');
  (data.error_summary || []).forEach(function(e) { lines.push('  - ' + e); });
  lines.push('\n## 最近日志');
  lines.push(data.recent_logs || '(无)');
  return lines.join('\n');
}

function _downloadReport(text) {
  var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'airp_bug_report_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
