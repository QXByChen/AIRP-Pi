<style>
@import url("https://fontsapi.zeoseven.com/59/main/result.css");

:root {
  --bg-hue: 220;
  --bg-sat: 20%;
  --bg-lit: 15%;
  --glass-bg: hsla(var(--bg-hue), var(--bg-sat), 25%, 0.4);
  --glass-border: hsla(var(--bg-hue), var(--bg-sat), 80%, 0.15);
  --glass-shadow: hsla(0, 0%, 0%, 0.3);
  --text-main: hsla(0, 0%, 95%, 1);
  --text-sub: hsla(0, 0%, 75%, 1);
  --accent-hue: 280;
  --accent-sat: 80%;
  --accent-lit: 65%;
  --accent-color: hsla(var(--accent-hue), var(--accent-sat), var(--accent-lit), 1);
  --accent-glow: hsla(var(--accent-hue), var(--accent-sat), var(--accent-lit), 0.5);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 8px;
  --transition-fast: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  --transition-slow: 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
}

#mvu-app-wrapper {
  font-family: "JiangChengYuanTi", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  width: 100%;
  max-width: 1000px;
  margin: 10px auto;
  color: var(--text-main);
  box-sizing: border-box;
}

#mvu-app-wrapper * { box-sizing: border-box; }

.glass-container {
  position: relative;
  width: 100%;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: 0 10px 30px var(--glass-shadow), inset 0 1px 1px hsla(0,0%,100%,0.1);
  overflow: hidden;
  transition: var(--transition-slow);
}

.glass-container::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 50% 50%, hsla(var(--accent-hue), 50%, 40%, 0.15), transparent 50%);
  animation: rotateBg 20s linear infinite;
  will-change: transform; /* 优化：GPU加速 */
  z-index: -1;
  pointer-events: none;
}

@keyframes rotateBg {
  to { transform: rotate(360deg); }
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: var(--transition-fast);
}

.app-header:hover { background: hsla(0,0%,100%,0.05); }

.app-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.app-title svg {
  width: 18px; height: 18px;
  fill: var(--accent-color);
  filter: drop-shadow(0 0 4px var(--accent-glow));
}

.toggle-icon {
  width: 20px; height: 20px;
  fill: var(--text-sub);
  transition: transform var(--transition-fast);
}

.glass-container.collapsed .toggle-icon { transform: rotate(-90deg); }

.app-body {
  display: flex;
  flex-direction: row;
  padding: 20px;
  gap: 20px;
  max-height: 2000px;
  opacity: 1;
  transition: max-height var(--transition-slow), opacity var(--transition-slow), padding var(--transition-slow);
}

.glass-container.collapsed .app-body {
  max-height: 0;
  opacity: 0;
  padding: 0 20px;
  overflow: hidden;
}

.left-panel {
  flex: 1;
  min-width: 250px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.info-card {
  background: hsla(0,0%,0%,0.2);
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.info-row { display: flex; align-items: center; gap: 12px; }

.info-icon { width: 20px; height: 20px; fill: var(--accent-color); }

.info-text { display: flex; flex-direction: column; }

.info-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; }

.info-val { font-size: 14px; font-weight: 500; text-shadow: 0 0 8px hsla(0,0%,100%,0.3); }

.male-list { display: flex; flex-direction: column; gap: 10px; }

.male-item {
  background: hsla(0,0%,0%,0.2);
  border-radius: var(--radius-md);
  border: 1px solid var(--glass-border);
  overflow: hidden;
}

.male-header {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: var(--transition-fast);
}

.male-header:hover { background: hsla(0,0%,100%,0.05); }

.male-name { font-size: 15px; font-weight: 600; }

.male-body {
  max-height: 0;
  padding: 0 16px;
  opacity: 0;
  transition: all var(--transition-fast);
  background: hsla(0,0%,0%,0.3);
}

.male-item.active .male-body { max-height: 300px; padding: 12px 16px; opacity: 1; }
.male-item.active .male-header .toggle-icon { transform: rotate(180deg); }

.detail-row { margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
.detail-row:last-child { margin-bottom: 0; }
.detail-label { color: var(--accent-color); font-weight: 600; margin-right: 6px; }

/* ===== 优化：right-panel直接作为grid容器，去掉多余的.grid-container层 ===== */
.right-panel {
  flex: 2;
  position: relative;
  aspect-ratio: 1 / 1;
  max-height: 600px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  transition: all var(--transition-slow);
}

.flip-card {
  background-color: transparent;
  width: 100%;
  height: 100%;
  perspective: 1000px;
  cursor: pointer;
  transition: opacity var(--transition-slow), transform var(--transition-slow);
  z-index: 1;
}

.flip-card.active-full {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
}

.right-panel.has-active .flip-card:not(.active-full) {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}

.flip-card-inner {
  position: relative;
  width: 100%; height: 100%;
  text-align: center;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transform-style: preserve-3d;
  border-radius: var(--radius-md);
  box-shadow: 0 4px 15px var(--glass-shadow);
}

.flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%; height: 100%;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  border-radius: var(--radius-md);
}

.flip-card-front {
  background-size: cover;
  background-position: center;
  background-color: hsla(0,0%,10%,1);
  overflow: hidden;
}

.flip-card-front::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, hsla(0,0%,0%,0.8) 0%, transparent 40%);
  pointer-events: none;
}

.card-name {
  position: absolute;
  bottom: 15px; left: 15px;
  font-size: 18px; font-weight: 600;
  text-shadow: 0 2px 4px hsla(0,0%,0%,0.8);
  z-index: 2;
  pointer-events: none;
}

.sex-count-wrap {
  position: absolute;
  bottom: 15px; right: 15px;
  font-size: 18px; font-weight: 600;
  text-shadow: 0 2px 4px hsla(0,0%,0%,0.8);
  z-index: 5;
  cursor: pointer;
  display: flex;
  justify-content: center;
}

.sex-count-val {
  display: inline-block;
  transition: transform 0.3s, color 0.3s;
}

.sex-count-wrap:hover .sex-count-val {
  color: #ff1493;
  transform: scale(1.5);
  text-shadow: 0 0 10px rgba(255, 20, 147, 0.8);
}

.hearts-container {
  display: none;
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  width: 30px; height: 50px;
  pointer-events: none;
}

.sex-count-wrap:hover .hearts-container { display: block; }

.hearts-container span {
  position: absolute;
  bottom: 0;
  color: #ff1493;
  font-size: 14px;
  opacity: 0;
  animation: floatHeart 1.5s infinite ease-in;
  text-shadow: 0 0 5px rgba(255, 20, 147, 0.8);
}

.hearts-container span:nth-child(1) { left: -10px; animation-delay: 0s; }
.hearts-container span:nth-child(2) { left: 5px; animation-delay: 0.5s; font-size: 10px; }
.hearts-container span:nth-child(3) { left: 15px; animation-delay: 1s; font-size: 16px; }

@keyframes floatHeart {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
}

.flip-card-back {
  transform: rotateY(180deg);
  background: transparent;
  overflow: hidden;
}

/* 各角色个性颜色 */
#f-liuruyan   { --glow-color: #ff3333; }
#f-bainingbing{ --glow-color: #1e90ff; }
#f-grace      { --glow-color: #00ff7f; }
#f-ninghan    { --glow-color: #9932cc; }

.flip-card-back::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: conic-gradient(transparent, transparent 70%, var(--glow-color) 100%);
  animation: border-flow 3s linear infinite;
  will-change: transform; /* 优化：GPU加速 */
  z-index: -2;
}

@keyframes border-flow {
  to { transform: rotate(360deg); }
}

.flip-card-back::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: hsl(var(--bg-hue), var(--bg-sat), 10%);
  border-radius: calc(var(--radius-md) - 2px);
  z-index: -1;
}

.back-content-wrapper {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px;
  text-align: left;
  overflow-y: auto;
  overscroll-behavior: contain;
  z-index: 1;
}

.back-content-wrapper::-webkit-scrollbar { width: 4px; }
.back-content-wrapper::-webkit-scrollbar-thumb { background: var(--text-sub); border-radius: 4px; }

.back-header {
  font-size: 20px; font-weight: bold;
  color: var(--text-main);
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 10px; margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.stat-preg {
  font-size: 12px; padding: 2px 8px;
  border-radius: 12px;
  background: hsla(0,0%,100%,0.1);
  color: var(--text-sub);
  font-weight: normal;
  border: 1px solid var(--glass-border);
}

.stat-preg.is-pregnant {
  background: rgba(255, 20, 147, 0.2);
  color: #ff1493;
  border-color: #ff1493;
  box-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
  font-weight: bold;
}

.close-btn {
  width: 24px; height: 24px;
  fill: var(--text-main);
  background: hsla(0,0%,100%,0.1);
  border-radius: 50%;
  padding: 4px;
  flex-shrink: 0;
  cursor: pointer;
  transition: var(--transition-fast);
}
.close-btn:hover { background: hsla(0,0%,100%,0.2); transform: scale(1.1); }

.core-stat {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
  background: hsla(0,0%,0%,0.3);
  padding: 12px 15px;
  border-radius: var(--radius-md);
  border: 1px solid var(--glass-border);
  gap: 15px;
}

.liquid-sphere {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: hsla(0,0%,10%,0.8);
  position: relative;
  overflow: hidden;
  /* 优化：颜色跟随各角色glow-color */
  border: 2px solid var(--glow-color, rgba(0, 210, 255, 0.5));
  box-shadow: 0 0 15px var(--glow-color, rgba(0, 210, 255, 0.4)), inset 0 0 10px rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.liquid-wave {
  position: absolute;
  width: 200%; height: 200%;
  /* 优化：波浪颜色跟随glow-color */
  background: linear-gradient(0deg, var(--glow-color, #00d2ff) 0%, rgba(255,255,255,0.6) 100%);
  top: calc(100% - var(--percent, 0%));
  left: -50%;
  border-radius: 40%;
  animation: wave 4s infinite linear;
  will-change: transform; /* 优化：GPU加速 */
  transition: top 1s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

@keyframes wave {
  to { transform: rotate(360deg); }
}

.stat-val {
  position: relative;
  font-size: 16px; font-weight: bold;
  z-index: 2; color: #fff;
  text-shadow: 0 0 5px #000, 0 0 8px #000;
}

.stat-info-col { display: flex; flex-direction: column; flex: 1; gap: 6px; }

.stat-stage {
  font-size: 13px; font-weight: bold;
  color: #ff69b4;
  text-shadow: 0 0 5px rgba(255, 105, 180, 0.5);
}

.stat-name-row { display: flex; align-items: center; gap: 10px; }

.stat-name { font-size: 13px; color: var(--text-sub); white-space: nowrap; }

.core-progress-bar {
  flex: 1; height: 6px;
  background: hsla(0,0%,100%,0.1);
  border-radius: 3px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}

.core-progress-fill {
  height: 100%;
  /* 优化：进度条颜色跟随glow-color */
  background: linear-gradient(90deg, var(--glow-color, #00d2ff) 0%, rgba(255,255,255,0.7) 100%);
  width: var(--percent, 0%);
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 10px var(--glow-color, #00d2ff);
  position: relative;
}

.core-progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  animation: shimmer 2s infinite linear;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.data-section { margin-bottom: 15px; }

.section-title {
  font-size: 12px; text-transform: uppercase;
  color: var(--text-sub); margin-bottom: 8px; letter-spacing: 1px;
}

.data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.data-item {
  background: hsla(0,0%,0%,0.3);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  border: 1px solid transparent;
  transition: var(--transition-fast);
  display: flex; flex-direction: column;
}

.data-item:hover { background: hsla(0,0%,100%,0.05); }

.data-key-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

.data-icon { width: 20px; height: 20px; flex-shrink: 0; }

.data-key { color: hsla(0, 0%, 70%, 1); font-size: 12px; }

.data-val { color: var(--text-main); font-weight: 500; padding-left: 28px; }

.status-block {
  background: hsla(0,0%,0%,0.3);
  border-left: 3px solid #ff4d88;
  padding: 10px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 13px; line-height: 1.5;
}

@media (max-width: 768px) {
  .app-body { flex-direction: column; max-height: 4000px; }
  .left-panel { flex: none; width: 100%; min-width: unset; }
  .right-panel {
    flex: none; width: 100%;
    aspect-ratio: 1 / 1;
    height: auto; max-height: none;
  }
  .right-panel.expanded {
    aspect-ratio: auto;
    height: 80vh;
    min-height: 500px;
  }
}
</style>
