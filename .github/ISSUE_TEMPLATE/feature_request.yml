name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能？解决什么问题？
      placeholder: "例：希望能在前端直接切换文风配置..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 在什么情况下你需要这个功能？
      placeholder: "例：当我在多个角色卡之间切换时..."

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你目前是如何解决这个需求的？有没有考虑过其他方案？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - 高 — 严重影响使用体验
        - 中 — 有了会更好
        - 低 — 锦上添花
