name: Bug 报告
description: 报告一个问题或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，帮助我们快速定位问题。
        如果你使用了前端的「🐛 诊断报告」按钮，请将生成的报告粘贴到最后一栏。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？你期望的行为是什么？
      placeholder: "例：点击发送后页面无响应，控制台报错..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？
      placeholder: |
        1. 导入角色卡 XXX
        2. 发送消息 "..."
        3. 观察到...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python 版本
      description: "运行 python --version 查看"
      placeholder: "3.11.5"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js 版本
      description: "运行 node --version 查看"
      placeholder: "v20.10.0"

  - type: dropdown
    id: browser
    attributes:
      label: 浏览器
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - 其他

  - type: textarea
    id: card_info
    attributes:
      label: 角色卡信息
      description: 使用的角色卡名称、来源格式（PNG/JSON/TXT）
      placeholder: "角色卡名称: XXX，格式: PNG"

  - type: textarea
    id: error_messages
    attributes:
      label: 错误信息
      description: 控制台输出、终端报错、或页面上显示的错误
      render: shell

  - type: textarea
    id: diagnostic_report
    attributes:
      label: 诊断报告
      description: |
        点击前端顶栏的 🐛 按钮生成诊断报告，或运行 `python skills/bug_report.py`，将内容粘贴到此处。
      render: text

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、日志片段、或其他有助于排查的信息
